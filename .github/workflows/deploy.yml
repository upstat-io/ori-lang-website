name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [ori-lang-content-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read  # Needed to download test-results artifact from ori_lang CI

concurrency:
  group: pages
  cancel-in-progress: true

env:
  RUST_VERSION: "1.93.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout compiler repo
        uses: actions/checkout@v4
        with:
          repository: upstat-io/ori-lang
          path: compiler_repo
          fetch-depth: 0  # Full history for changelog generation
          token: ${{ secrets.ORI_LANG_PAT }}

      - name: Checkout wrapper for plans/ + docs/ content
        uses: actions/checkout@v4
        with:
          repository: upstat-io/ori_lang_ai
          path: ori_lang_wrapper
          token: ${{ secrets.ORI_LANG_PAT }}

      # The website lives nested inside the wrapper locally, so content paths
      # resolve as siblings of the website dir: ../compiler_repo, ../plans,
      # ../docs. Mirror that shape around $GITHUB_WORKSPACE with symlinks.
      - name: Mirror nested wrapper layout for content collections
        run: |
          ln -s "$GITHUB_WORKSPACE/compiler_repo" "$GITHUB_WORKSPACE/../compiler_repo"
          ln -s "$GITHUB_WORKSPACE/ori_lang_wrapper/plans" "$GITHUB_WORKSPACE/../plans"
          ln -s "$GITHUB_WORKSPACE/ori_lang_wrapper/docs" "$GITHUB_WORKSPACE/../docs"
          # .claude/rules/ori-syntax.md feeds /llms-syntax.txt + /llms-full.txt
          ln -s "$GITHUB_WORKSPACE/ori_lang_wrapper/.claude" "$GITHUB_WORKSPACE/../.claude"

      - name: Fetch test results from CI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          repo: upstat-io/ori-lang
          branch: master
          name: test-results
          path: public
          if_no_artifact_found: warn
          github_token: ${{ secrets.ORI_LANG_PAT }}
        continue-on-error: true

      - name: Validate test results
        run: |
          cd public
          if [ ! -f test-results.json ]; then
            echo '{"timestamp":"","overall":"unknown","suites":[],"totals":{"passed":0,"failed":0,"skipped":0,"lcfail":0}}' > test-results.json
          fi
          echo "Test results:"
          cat test-results.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: playground-wasm -> playground-wasm/target
          cache-on-failure: true

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Read build number
        run: |
          # Read the committed BUILD_NUMBER from ori_lang master — do NOT
          # derive the next one. bump-build.sh computes the *next* release
          # number, but the website should display the *current* released version.
          echo "Build number: $(cat compiler_repo/BUILD_NUMBER)"

      - name: Build WASM
        run: |
          cd playground-wasm
          wasm-pack build --target web --out-dir pkg --release

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build website
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
