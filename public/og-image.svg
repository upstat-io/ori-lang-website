<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0b0e"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#181a1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Logo mark -->
  <g transform="translate(500, 120)">
    <defs>
      <linearGradient id="og-g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#362b12"/>
        <stop offset="100%" stop-color="#132a2f"/>
      </linearGradient>
    </defs>
    <rect width="200" height="200" rx="30" fill="url(#og-g)"/>
    <path d="M55 55 L110 100 L55 145" stroke="#bea33c" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M105 55 L160 100 L105 145" stroke="#74b3b0" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="72" fill="#bea33c">Ori</text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#9ca0ab">Functional Code. Imperative Speed.</text>

  <!-- Subtitle -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="20" fill="#636874">No GC · No borrow checker · Eight optimizations · Value semantics</text>

  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="monospace" font-weight="500" font-size="18" fill="#4ec9b0">ori-lang.com</text>
</svg>
